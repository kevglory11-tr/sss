<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Metin2Board – SSS</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════
   RESET & VARIABLES
══════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a84c;
  --gold-hi:#f0d278;
  --gold-lo:#7a5e1a;
  --gold-a15:rgba(201,168,76,.15);
  --gold-a30:rgba(201,168,76,.30);
  --gold-a60:rgba(201,168,76,.60);
  --bg:#04040a;
  --surface:rgba(255,255,255,.038);
  --border:rgba(201,168,76,.16);
  --muted:#666;
}
html{scroll-behavior:smooth}
body{
  font-family:'Raleway',sans-serif;
  background:var(--bg);
  color:#ddd;
  overflow-x:hidden;
  cursor:none;
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gold-a30);border-radius:3px}

/* ══════════════════════════════════════════
   CURSOR
══════════════════════════════════════════ */
#cDot{
  position:fixed;width:7px;height:7px;border-radius:50%;
  background:var(--gold);pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);mix-blend-mode:screen;
}
#cRing{
  position:fixed;width:32px;height:32px;border-radius:50%;
  border:1px solid var(--gold-a60);pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:width .3s,height .3s,border-color .3s;
}

/* ══════════════════════════════════════════
   CANVAS + NOISE
══════════════════════════════════════════ */
#bgCanvas{position:fixed;inset:0;z-index:-2;pointer-events:none}
.noise{
  position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:160px;
}

/* ══════════════════════════════════════════
   HERO
══════════════════════════════════════════ */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:40px 24px 60px;
  overflow:hidden;
}

.hero-bg{
  position:absolute;inset:0;z-index:0;
  background:url("hero.jpg") center/cover no-repeat;
  filter:brightness(.22) saturate(1.3);
  transform:scale(1.08);
  will-change:transform;
}

/* Sinematik vignette */
.hero-vignette{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 50% 48%, transparent 10%, rgba(4,4,10,.92) 100%),
    linear-gradient(to bottom, rgba(4,4,10,.7) 0%, transparent 15%, transparent 80%, rgba(4,4,10,1) 100%);
}

/* Sinematik yatay ışık bantları */
.cin-lines{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:
    linear-gradient(to bottom,
      transparent 0%, transparent 5%,
      rgba(201,168,76,.018) 5%, rgba(201,168,76,.018) 6%,
      transparent 6%, transparent 94%,
      rgba(201,168,76,.018) 94%, rgba(201,168,76,.018) 95%,
      transparent 95%);
}

/* Sol karakter */
.char-left{
  position:absolute;left:0;bottom:0;z-index:2;
  width:42%;height:100%;
  background:url("hero.jpg") left bottom/240% auto no-repeat;
  mask-image:linear-gradient(to right,rgba(0,0,0,.9) 30%,transparent 100%);
  -webkit-mask-image:linear-gradient(to right,rgba(0,0,0,.9) 30%,transparent 100%);
  transform-origin:bottom left;
  animation:floatL 5.5s ease-in-out infinite;
  will-change:transform,filter;
}
.char-right{
  position:absolute;right:0;bottom:0;z-index:2;
  width:42%;height:100%;
  background:url("hero.jpg") right bottom/240% auto no-repeat;
  mask-image:linear-gradient(to left,rgba(0,0,0,.9) 30%,transparent 100%);
  -webkit-mask-image:linear-gradient(to left,rgba(0,0,0,.9) 30%,transparent 100%);
  transform-origin:bottom right;
  animation:floatR 7s ease-in-out infinite;
  will-change:transform,filter;
}
@keyframes floatL{
  0%,100%{transform:translateY(0);   filter:drop-shadow(0 0 18px rgba(201,168,76,.1))}
  30%    {transform:translateY(-18px);filter:drop-shadow(0 0 55px rgba(201,168,76,.7)) brightness(1.12)}
  65%    {transform:translateY(-7px)}
}
@keyframes floatR{
  0%,100%{transform:translateY(0);   filter:drop-shadow(0 0 18px rgba(255,80,40,.08))}
  40%    {transform:translateY(-22px);filter:drop-shadow(0 0 60px rgba(255,80,40,.6)) brightness(1.13)}
  72%    {transform:translateY(-9px)}
}

.sword-glow{
  position:absolute;left:13.5%;top:25%;z-index:3;
  width:2px;height:38%;
  background:linear-gradient(180deg,transparent,rgba(201,168,76,.95),transparent);
  border-radius:2px;transform:rotate(-30deg);filter:blur(2.5px);
  animation:swordFlash 3.8s ease-in-out infinite;
}
@keyframes swordFlash{
  0%,100%{opacity:.07;transform:rotate(-30deg) scaleY(.7)}
  48%    {opacity:1;  transform:rotate(-30deg) scaleY(1.2)}
}

/* Zemin altın haze */
.hero-haze{
  position:absolute;bottom:-60px;left:50%;transform:translateX(-50%);
  z-index:2;pointer-events:none;
  width:800px;height:320px;
  background:radial-gradient(ellipse,rgba(201,168,76,.065) 0%,transparent 70%);
  animation:hazeBreath 6s ease-in-out infinite;
}
@keyframes hazeBreath{
  0%,100%{opacity:.5;transform:translateX(-50%) scaleY(1)}
  50%    {opacity:1;transform:translateX(-50%) scaleY(1.18)}
}

/* ── HERO İÇERİK ── */
.hero-content{
  position:relative;z-index:4;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  width:100%;max-width:760px;
  gap:0;
}

/* LOGO */
.logo-wrap{
  position:relative;
  margin-bottom:4px;
  animation:logoReveal 1.4s .1s both;
}
.logo-wrap img{
  width:min(580px,88vw);
  filter:drop-shadow(0 0 30px rgba(201,168,76,.25));
  transition:filter .6s;
}
.logo-wrap:hover img{
  filter:drop-shadow(0 0 60px rgba(201,168,76,.7)) brightness(1.08);
}
/* Logo altın parıltı sweep */
.logo-sweep{
  position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 30%,rgba(240,210,120,.22) 50%,transparent 70%);
  animation:sweep 4s ease-in-out infinite;
  pointer-events:none;
  border-radius:8px;
}
@keyframes sweep{
  0%,100%{transform:translateX(-120%)}
  50%    {transform:translateX(120%)}
}
@keyframes logoReveal{
  0%  {opacity:0;transform:scale(.88) translateY(30px);filter:drop-shadow(0 0 0px rgba(201,168,76,0))}
  60% {filter:drop-shadow(0 0 50px rgba(201,168,76,.6))}
  100%{opacity:1;transform:scale(1) translateY(0);filter:drop-shadow(0 0 25px rgba(201,168,76,.22))}
}

/* ATIUS */
.atius-wrap{
  margin-bottom:6px;
  animation:riseIn .9s .7s both;
}
.atius-wrap img{
  width:min(400px,70vw);
  filter:drop-shadow(0 2px 18px rgba(201,168,76,.35));
  animation:subtlePulse 3s ease-in-out infinite;
}
@keyframes subtlePulse{
  0%,100%{filter:drop-shadow(0 2px 18px rgba(201,168,76,.3))}
  50%    {filter:drop-shadow(0 2px 32px rgba(201,168,76,.65)) brightness(1.06)}
}

/* 6 MART */
.mart-wrap{
  margin-bottom:40px;
  animation:riseIn .9s .95s both;
}
.mart-wrap img{
  width:min(520px,82vw);
  filter:drop-shadow(0 0 22px rgba(201,168,76,.4));
  animation:martGlow 2s ease-in-out infinite;
}
@keyframes martGlow{
  0%,100%{filter:drop-shadow(0 0 18px rgba(201,168,76,.35)) brightness(1)}
  50%    {filter:drop-shadow(0 0 45px rgba(201,168,76,.85)) brightness(1.1)}
}

/* CTA BUTTON */
.hero-btn{
  position:relative;
  display:inline-flex;align-items:center;gap:12px;
  padding:14px 50px;
  border:1px solid var(--gold-a30);
  border-radius:2px;
  background:rgba(0,0,0,.3);
  backdrop-filter:blur(16px);
  color:var(--gold-hi);
  font-family:'Raleway',sans-serif;
  font-size:11px;font-weight:600;
  letter-spacing:5px;text-transform:uppercase;
  cursor:pointer;
  overflow:hidden;
  transition:border-color .4s,box-shadow .4s,transform .3s;
  animation:riseIn .9s 1.2s both;
}
.hero-btn .shine{
  position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 35%,rgba(201,168,76,.2) 50%,transparent 65%);
  transform:translateX(-100%);
  transition:transform .65s ease;
}
.hero-btn:hover .shine{transform:translateX(100%)}
.hero-btn:hover{
  border-color:var(--gold);
  box-shadow:0 0 50px rgba(201,168,76,.38),inset 0 0 18px rgba(201,168,76,.06);
  transform:translateY(-4px);
}
.hero-btn span{position:relative;z-index:1}
.hero-btn .arr{position:relative;z-index:1;font-size:16px;opacity:.7;transition:transform .3s}
.hero-btn:hover .arr{transform:translateX(5px)}

/* Scroll hint */
.scroll-hint{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  z-index:5;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  animation:riseIn .9s 1.5s both;
}
.scroll-hint p{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);opacity:.32}
.scroll-bar{
  width:1px;height:42px;
  background:linear-gradient(180deg,var(--gold),transparent);
  animation:scrollAnim 2.2s ease-in-out infinite;
  transform-origin:top;
}
@keyframes scrollAnim{
  0%{transform:scaleY(0);opacity:1}
  60%{transform:scaleY(1);opacity:1}
  100%{transform:scaleY(1);opacity:0}
}

/* ══════════════════════════════════════════
   FAQ SECTION
══════════════════════════════════════════ */
.faq-wrap{
  position:relative;z-index:1;
  max-width:840px;margin:0 auto;
  padding:100px 24px 140px;
}

.sec-head{text-align:center;margin-bottom:70px}
.sec-head h2{
  font-family:'Cinzel',serif;
  font-size:clamp(18px,2.8vw,26px);
  font-weight:700;letter-spacing:5px;
  background:linear-gradient(135deg,#fff,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:10px;
}
.sec-head p{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted)}
.sec-orn{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:22px}
.sec-orn .line{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.sec-orn .line:last-child{background:linear-gradient(90deg,var(--gold),transparent)}
.sec-orn i{color:var(--gold);font-style:normal;font-size:11px;opacity:.55}

/* Accordion */
.acc-item{
  position:relative;
  border:1px solid var(--border);border-radius:6px;
  margin-bottom:10px;
  background:var(--surface);overflow:hidden;
  opacity:0;transform:translateY(36px);
  transition:
    opacity .65s ease,transform .65s cubic-bezier(.15,.85,.25,1),
    border-color .35s,box-shadow .35s,background .35s;
}
.acc-item.visible{opacity:1;transform:translateY(0)}
.acc-item:hover{
  border-color:rgba(201,168,76,.28);
  background:rgba(255,255,255,.055);
  box-shadow:0 6px 32px rgba(0,0,0,.55);
}
.acc-item.open{
  border-color:rgba(201,168,76,.48);
  background:rgba(201,168,76,.04);
  box-shadow:0 10px 50px rgba(0,0,0,.65),0 0 0 1px rgba(201,168,76,.05);
}
.acc-item::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:0;
  background:linear-gradient(180deg,var(--gold-hi),var(--gold-lo));
  border-radius:0 2px 2px 0;
  transition:height .45s cubic-bezier(.15,.85,.25,1);
}
.acc-item.open::before{height:55%}
.acc-header{
  display:flex;align-items:center;gap:16px;
  padding:20px 22px;cursor:pointer;user-select:none;
}
.acc-num{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;
  color:var(--gold);opacity:.28;min-width:24px;flex-shrink:0;
  transition:opacity .3s;
}
.acc-item:hover .acc-num,.acc-item.open .acc-num{opacity:.85}
.acc-q{flex:1;font-size:15px;font-weight:500;letter-spacing:.25px;line-height:1.55}
.acc-icon{
  flex-shrink:0;width:26px;height:26px;border-radius:50%;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--gold);font-size:15px;
  transition:transform .45s cubic-bezier(.15,.85,.25,1),background .3s,border-color .3s;
}
.acc-item.open .acc-icon{transform:rotate(45deg);background:var(--gold-a15);border-color:var(--gold)}
.acc-body-wrap{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.15,.85,.25,1)}
.acc-body{
  padding:16px 22px 22px 62px;
  font-size:14px;font-weight:300;line-height:1.95;color:#aaa;
  border-top:1px solid rgba(201,168,76,.06);
}
.acc-body a{color:var(--gold);text-decoration:underline;text-underline-offset:3px;transition:opacity .2s}
.acc-body a:hover{opacity:.7}

/* ══════════════════════════════════════════
   FOOTER
══════════════════════════════════════════ */
footer{
  position:relative;z-index:1;text-align:center;
  padding:30px 20px 36px;
  border-top:1px solid rgba(201,168,76,.08);
  font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);
}
footer em{color:var(--gold);font-style:normal;opacity:.5}

/* ══════════════════════════════════════════
   MUSIC BUTTON
══════════════════════════════════════════ */
#musicBtn{
  position:fixed;bottom:24px;right:24px;z-index:1000;
  width:46px;height:46px;border-radius:50%;
  border:1px solid var(--gold-a30);
  background:rgba(4,4,10,.65);backdrop-filter:blur(18px);
  color:var(--gold);font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .3s,box-shadow .35s,transform .25s;
}
#musicBtn:hover{background:rgba(201,168,76,.15);box-shadow:0 0 30px rgba(201,168,76,.45);transform:scale(1.1)}
#musicBtn.on{animation:musicPulse 2.8s ease-in-out infinite}
@keyframes musicPulse{
  0%,100%{box-shadow:0 0 8px rgba(201,168,76,.2)}
  50%    {box-shadow:0 0 38px rgba(201,168,76,.78)}
}

/* ══════════════════════════════════════════
   KEYFRAMES
══════════════════════════════════════════ */
@keyframes riseIn{
  from{opacity:0;transform:translateY(22px)}
  to  {opacity:1;transform:translateY(0)}
}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media(max-width:640px){
  body{cursor:auto}
  #cDot,#cRing{display:none}
  .char-left,.char-right{width:34%;opacity:.55}
  .sword-glow,.cin-lines{display:none}
  .acc-num{display:none}
  .acc-body{padding-left:22px}
  #musicBtn{bottom:16px;right:16px;width:42px;height:42px}
}
</style>
</head>
<body>

<div id="cDot"></div>
<div id="cRing"></div>
<canvas id="bgCanvas"></canvas>
<div class="noise"></div>

<!-- ══════════ HERO ══════════ -->
<section class="hero" id="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-vignette"></div>
  <div class="cin-lines"></div>
  <div class="hero-haze"></div>
  <div class="char-left" id="charL"></div>
  <div class="sword-glow"></div>
  <div class="char-right" id="charR"></div>

  <div class="hero-content">

    <!-- LOGO -->
    <div class="logo-wrap">
      <div class="logo-sweep"></div>
      <img src="LOGO.png" alt="Metin2Board Logo"/>
    </div>

    <!-- ATIUS VE WIZARD -->
    <div class="atius-wrap">
      <img src="atius.png" alt="Atius ve Wizard Güvencesiyle"/>
    </div>

    <!-- 6 MART -->
    <div class="mart-wrap">
      <img src="mart.png" alt="6 Mart 21:00'da Açılıyor"/>
    </div>

    <!-- CTA -->
    <button class="hero-btn" onclick="document.getElementById('faq').scrollIntoView({behavior:'smooth'})">
      <div class="shine"></div>
      <span>Soruları Keşfet</span>
      <span class="arr">›</span>
    </button>

  </div>

  <div class="scroll-hint">
    <p>Kaydır</p>
    <div class="scroll-bar"></div>
  </div>
</section>

<!-- ══════════ FAQ ══════════ -->
<div class="faq-wrap" id="faq">
  <div class="sec-head">
    <h2>Sıkça Sorulan Sorular</h2>
    <p>Her sorunun cevabı burada</p>
    <div class="sec-orn">
      <span class="line"></span>
      <i>✦</i>
      <span class="line"></span>
    </div>
  </div>
  <div id="accList"></div>
</div>

<footer>
  <em>✦</em>&nbsp;&nbsp;Metin2Board &nbsp;·&nbsp; Tüm hakları saklıdır&nbsp;&nbsp;<em>✦</em>
</footer>

<audio id="bgMusic" src="background.mp3" loop preload="auto"></audio>
<button id="musicBtn" title="Müzik">🎵</button>

<script>
/* ── CURSOR ── */
const cDot=document.getElementById('cDot'),cRing=document.getElementById('cRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cDot.style.left=mx+'px';cDot.style.top=my+'px';});
(function loop(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;cRing.style.left=rx+'px';cRing.style.top=ry+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('button,a').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cRing.style.width='52px';cRing.style.height='52px';cRing.style.borderColor='rgba(201,168,76,.95)';});
  el.addEventListener('mouseleave',()=>{cRing.style.width='32px';cRing.style.height='32px';cRing.style.borderColor='rgba(201,168,76,.6)';});
});

/* ── PARTICLES ── */
const canvas=document.getElementById('bgCanvas'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize,{passive:true});
const pts=Array.from({length:75},()=>{return{x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.9+.3,a:Math.random()*.55+.08,vy:Math.random()*.28+.06,vx:(Math.random()-.5)*.13,star:Math.random()<.14,tw:Math.random()*Math.PI*2};});
function star4(x,y,r,a){ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#c9a84c';ctx.shadowBlur=20;ctx.shadowColor='#c9a84c';ctx.translate(x,y);for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(0,0,r*1.7,r*.22,(i*Math.PI)/2,0,Math.PI*2);ctx.fill();}ctx.restore();}
function loop(){ctx.clearRect(0,0,W,H);pts.forEach(p=>{p.tw+=.018;const ta=p.a*(.65+.35*Math.sin(p.tw));if(p.star){star4(p.x,p.y,p.r,ta*.75);}else{ctx.beginPath();ctx.fillStyle=`rgba(201,168,76,${ta})`;ctx.shadowBlur=12;ctx.shadowColor='#c9a84c';ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}p.y-=p.vy;p.x+=p.vx;if(p.y<-10){p.y=H+10;p.x=Math.random()*W;}if(p.x<-10)p.vx=Math.abs(p.vx);if(p.x>W+10)p.vx=-Math.abs(p.vx);});requestAnimationFrame(loop);}
loop();

/* ── PARALLAX ── */
const heroBg=document.getElementById('heroBg');
window.addEventListener('scroll',()=>{const y=window.scrollY;heroBg.style.transform=`scale(1.08) translateY(${y*.065}px)`;},{passive:true});

/* ── CHARACTER HOVER ── */
const charL=document.getElementById('charL'),charR=document.getElementById('charR');
document.getElementById('hero').addEventListener('mousemove',e=>{
  const {left,width}=e.currentTarget.getBoundingClientRect();const x=(e.clientX-left)/width;
  charL.style.filter=x<.3?'drop-shadow(0 0 65px rgba(201,168,76,.9)) brightness(1.2)':'';
  charR.style.filter=x>.7?'drop-shadow(0 0 65px rgba(255,75,35,.85)) brightness(1.2)':'';
});
document.getElementById('hero').addEventListener('mouseleave',()=>{charL.style.filter='';charR.style.filter='';});

/* ── FAQ DATA ── */
const data=[
  {q:"Kaç Client ile drop alabiliriz?",a:"Bir cihaz başına 3 Client ile farm yapabilir, ayrıca Otomatik Av kullanabilirsiniz."},
  {q:"Nesne Market başlangıçta aktif olacak mı?",a:"Hayır. Oyunun gidişatına bağlı olarak zamanı geldiğinde aktif edilecektir."},
  {q:"İlan / Legal Market var mı?",a:"Evet. itemci.com üzerinden yasal şekilde satış yapabilirsiniz. IBAN satışları yasaktır."},

const accList=document.getElementById('accList');
data.forEach((item,i)=>{
  const el=document.createElement('div');el.className='acc-item';
  el.innerHTML=`<div class="acc-header"><span class="acc-num">${String(i+1).padStart(2,'0')}</span><span class="acc-q">${item.q}</span><span class="acc-icon">+</span></div><div class="acc-body-wrap"><div class="acc-body">${item.a}</div></div>`;
  accList.appendChild(el);
  el.querySelector('.acc-header').addEventListener('click',()=>{
    const isOpen=el.classList.contains('open');
    document.querySelectorAll('.acc-item.open').forEach(x=>{x.classList.remove('open');x.querySelector('.acc-body-wrap').style.maxHeight=null;});
    if(!isOpen){el.classList.add('open');const wrap=el.querySelector('.acc-body-wrap');wrap.style.maxHeight=wrap.scrollHeight+'px';}
  });
});

/* ── INTERSECTION OBSERVER ── */
const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:.07});
document.querySelectorAll('.acc-item').forEach((el,i)=>{el.style.transitionDelay=`${i*45}ms`;io.observe(el);});

/* ── MUSIC ── */
const music=document.getElementById('bgMusic'),musicBtn=document.getElementById('musicBtn');
musicBtn.addEventListener('click', () => {
  if (music.paused) {
    music.volume = 0;
    const p = music.play();
    if (p !== undefined) {
      p.then(() => {
        fade(0, 0.7);
        musicBtn.classList.add('on');
        musicBtn.textContent = '⏸';
      }).catch(e => console.warn('Müzik oynatılamadı:', e));
    }
  } else {
    fade(music.volume, 0, () => music.pause());
    musicBtn.classList.remove('on');
    musicBtn.textContent = '🎵';
  }
});
function fade(from, to, cb) {
  let v = from;
  const step = (to - from) / 20;
  const t = setInterval(() => {
    v += step;
    music.volume = Math.max(0, Math.min(1, v));
    if ((step > 0 && v >= to) || (step < 0 && v <= to)) {
      music.volume = Math.max(0, Math.min(1, to));
      clearInterval(t);
      if (cb) cb();
    }
  }, 55);
}
</script>
